- name: Build AAR
  run: |
    make lib_install
    export PATH="$PATH:$(go env GOPATH)/bin"
    export ANDROID_ABI="arm64-v8a armeabi-v7a"   # 按需修改
    make lib_android
  env:
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

- name: Strip and repack AAR
  run: |
    # 假设 AAR 输出在项目根目录
    AAR_FILE=$(ls *.aar | head -n 1)
    if [ -z "$AAR_FILE" ]; then
      echo "No AAR found"
      exit 1
    fi
    # 解压
    mkdir aar_temp
    unzip -q "$AAR_FILE" -d aar_temp
    # Strip .so 文件
    find aar_temp -name "*.so" -exec $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-unneeded {} \;
    # 可选：删除不需要的 ABI 目录（如果 ANDROID_ABI 未生效）
    # cd aar_temp/jni && rm -rf x86 x86_64 && cd -
    # 重新打包
    cd aar_temp
    zip -r -9 "../$AAR_FILE" .
    cd ..
    rm -rf aar_temp
  env:
    ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
