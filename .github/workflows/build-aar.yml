name: Build libbox.aar

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (optional, auto-detected if empty)"
        required: false
        type: string
      build_type:
        description: "Build type"
        required: true
        type: choice
        default: "Android"
        options:
          - Android   # 仅构建 libbox.aar

jobs:
  build_libbox:
    name: Build libbox.aar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.25.3'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            go run -v ./cmd/internal/read_tag --ci --nightly
            echo "version=$version" >> $GITHUB_OUTPUT
          fi

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          local-cache: true

      - name: Setup OpenJDK
        run: |
          sudo apt update && sudo apt install -y openjdk-17-jdk-headless
          java -version

      - name: Install gomobile and dependencies
        run: |
          make lib_install
          echo "PATH=$(go env GOPATH)/bin:$PATH" >> $GITHUB_ENV

      - name: Build Android library (libbox.aar)
        run: |
          make lib_android
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # ---------- 新增：去除调试信息，重新打包 ----------
      - name: Strip debug symbols from AAR
        run: |
          # 解压原始 AAR
          mkdir aar_contents
          cd aar_contents
          unzip -q ../libbox.aar

          NDK_PATH="$ANDROID_NDK_HOME"
          # 对每个 .so 文件进行 strip
          find . -name "*.so" | while read so; do
            # 确定 ABI 目录（如 arm64-v8a, armeabi-v7a, x86, x86_64）
            abi=$(dirname "$so" | sed 's|^\./||')
            case $abi in
              arm64-v8a)  strip_cmd="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-strip" ;;
              armeabi-v7a) strip_cmd="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/arm-linux-androideabi-strip" ;;
              x86)        strip_cmd="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android-strip" ;;
              x86_64)     strip_cmd="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android-strip" ;;
              *) echo "Unknown ABI: $abi, skipping strip for $so"; continue ;;
            esac
            echo "Stripping $so with $strip_cmd"
            "$strip_cmd" --strip-unneeded "$so"
          done

          # 重新打包 AAR（使用最大压缩）
          zip -9 -r ../libbox_stripped.aar .
          cd ..
          mv libbox_stripped.aar libbox.aar
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload libbox.aar
        uses: actions/upload-artifact@v4
        with:
          name: libbox-${{ steps.version.outputs.version }}.aar
          path: ./libbox.aar
          if-no-files-found: error
