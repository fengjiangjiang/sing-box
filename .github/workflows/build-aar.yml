name: Build libbox.aar (Optimized)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (optional, auto-detected)"
        required: false
        type: string
      build_type:
        description: "Build type"
        required: true
        type: choice
        default: "Android"
        options:
          - Android
      abis:
        description: "Android ABIs to build (comma-separated: arm64,arm,amd64,386)"
        required: false
        default: "arm64,arm"
        type: string

jobs:
  build_libbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '^1.25.3'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            go run -v ./cmd/internal/read_tag --ci --nightly
            echo "version=$version" >> $GITHUB_OUTPUT
          fi

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          local-cache: true

      - name: Setup OpenJDK
        run: |
          sudo apt update && sudo apt install -y openjdk-17-jdk-headless
          java -version

      - name: Prepare gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build optimized libbox.aar
        run: |
          # 将输入的 abis 转换为 gomobile target 列表
          TARGETS=()
          for abi in $(echo "${{ inputs.abis }}" | tr ',' ' '); do
            case $abi in
              arm64) TARGETS+=("android/arm64") ;;
              arm)   TARGETS+=("android/arm") ;;
              amd64) TARGETS+=("android/amd64") ;;
              386)   TARGETS+=("android/386") ;;
            esac
          done

          # 如果没有指定任何有效 ABI，使用默认值
          if [ ${#TARGETS[@]} -eq 0 ]; then
            echo "No valid ABI specified, using default: arm64,arm"
            TARGETS=("android/arm64" "android/arm")
          fi

          # 用逗号连接数组
          IFS=,
          TARGET_STR="${TARGETS[*]}"
          unset IFS
          echo "Building for targets: $TARGET_STR"

          gomobile bind -v -ldflags '-s -w' -target="$TARGET_STR" ./libbox
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload libbox.aar
        uses: actions/upload-artifact@v4
        with:
          name: libbox-${{ steps.version.outputs.version }}.aar
          path: ./libbox.aar
          if-no-files-found: error
